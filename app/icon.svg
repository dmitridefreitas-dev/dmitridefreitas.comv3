<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="hGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C4B5FD"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="borderGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="rgba(139,92,246,0.4)"/>
      <stop offset="100%" stop-color="rgba(76,29,149,0.1)"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#080810"/>
  <!-- Subtle purple border -->
  <rect width="32" height="32" rx="6" fill="none" stroke="url(#borderGrad)" stroke-width="1"/>

  <!-- H — left vertical bar -->
  <rect x="7" y="5" width="4" height="22" rx="1.5" fill="url(#hGrad)"/>
  <!-- H — right vertical bar -->
  <rect x="21" y="5" width="4" height="22" rx="1.5" fill="url(#hGrad)"/>
  <!-- H — crossbar -->
  <rect x="7" y="13" width="18" height="5" rx="1.5" fill="url(#hGrad)"/>

  <!-- Small accent dot bottom-right — like the "live" indicator on the cards -->
  <circle cx="26" cy="26" r="1.5" fill="#8B5CF6" opacity="0.7"/>
</svg>
